syntax = "proto3";

package beam.extension_runtime.v1;

import "ui.proto";

message GoBackToPluginListOutput {}

message OpenTargetOutput {
  string target = 1;
  string application = 2;
}

message FocusElementOutput {
  uint32 element_id = 1;
}

message ResetElementOutput {
  uint32 element_id = 1;
}

message ClearSearchBarOutput {}

message OpenExtensionPreferencesOutput {
  string extension_name = 1;
}

message OpenCommandPreferencesOutput {
  string extension_name = 1;
  string command_name = 2;
}

message RuntimeOutput {
  oneof output {
    GoBackToPluginListOutput go_back_to_plugin_list = 1;
    OpenTargetOutput open = 2;
    ShowHudRequest show_hud = 3;
    FocusElementOutput focus_element = 4;
    ResetElementOutput reset_element = 5;
    ClearSearchBarOutput clear_search_bar = 6;
    UpdateCommandMetadataRequest update_command_metadata = 7;
    OpenExtensionPreferencesOutput open_extension_preferences = 8;
    OpenCommandPreferencesOutput open_command_preferences = 9;
  }
}
