<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blocked by Beam Focus</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101114;
        color: #f7f7f8;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }
      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 28px;
        background: #181a1f;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 18px;
        color: #aeb3bd;
        line-height: 1.5;
      }
      .url {
        overflow-wrap: anywhere;
        font-size: 13px;
        color: #c7ccd4;
      }
      button {
        height: 36px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        background: #f7f7f8;
        color: #101114;
        font-weight: 650;
        cursor: pointer;
      }
      button.secondary {
        margin-left: 8px;
        background: #2a2d34;
        color: #f7f7f8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Blocked by Beam Focus</h1>
      <p id="goal">This website is blocked while your focus session is running.</p>
      <p class="url" id="url"></p>
      <button id="snooze">Snooze 5 minutes</button>
      <button class="secondary" id="close">Close tab</button>
    </main>
    <script src="block.js"></script>
  </body>
</html>
