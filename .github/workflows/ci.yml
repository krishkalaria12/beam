name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: setup swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1.2"

      - name: install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: lint
        run: bun run lint

      - name: check rust formatting
        run: bun run rust:fmt:check

      - name: check types
        run: bun run check-types

      - name: build extension runtime
        run: bun run extension-manager:build

      - name: build web
        run: bun run web:build

      - name: build desktop frontend
        run: bun run desktop:frontend:build

      - name: cargo build
        run: cargo build --manifest-path apps/desktop/src-tauri/Cargo.toml --locked
